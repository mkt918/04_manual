<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Hub | プレミアムな知識管理</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen selection:bg-indigo-100 selection:text-indigo-700">
    <!-- Background Decoration -->
    <div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-indigo-100/40 rounded-full blur-[100px] -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-emerald-100/30 rounded-full blur-[100px] -z-10"></div>

    <!-- Header -->
    <header class="sticky top-0 z-50 transition-all duration-300 bg-white/70 backdrop-blur-xl border-b border-white/20 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-3 group cursor-pointer">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-200 group-hover:scale-105 transition-transform duration-300">M</div>
                    <div class="flex flex-col">
                        <h1 class="text-xl font-extrabold tracking-tight text-slate-800 leading-none">Manual Hub</h1>
                        <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-indigo-500 mt-1">Archive System</span>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-8">
                    <nav class="flex space-x-8">
                        <a href="#" class="text-slate-500 hover:text-indigo-600 font-semibold transition-all duration-300 relative group">
                            ホーム
                            <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-indigo-600 transition-all duration-300 group-hover:w-full"></span>
                        </a>
                        <a href="#list" class="text-slate-500 hover:text-indigo-600 font-semibold transition-all duration-300 relative group">
                            マニュアル一覧
                            <span class="absolute -bottom-1 left-0 w-0 h-0.5 bg-indigo-600 transition-all duration-300 group-hover:w-full"></span>
                        </a>
                    </nav>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 lg:py-24">
        <!-- Hero Section -->
        <section class="mb-24 text-center max-w-4xl mx-auto">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-indigo-50 border border-indigo-100 mb-6 animate-fade-in">
                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-bold text-indigo-600 uppercase tracking-widest">Knowledge Repository</span>
            </div>
            <h2 class="text-5xl lg:text-7xl font-black text-slate-900 mb-8 tracking-tight leading-[1.1]">
                あなたの知識を、<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-emerald-600">永久保存する。</span>
            </h2>
            <p class="text-lg lg:text-xl text-slate-500 max-w-2xl mx-auto leading-relaxed font-medium">
                重要な手順や知識を、美しく構造化されたマニュアルとして集約。必要な時に、必要な場所で、一瞬で見つけ出すことができます。
            </p>
        </section>

        <!-- Search & Control Section -->
        <section class="mb-16">
            <div class="bg-white/80 backdrop-blur-md rounded-3xl p-8 shadow-xl border border-white/40 ring-1 ring-slate-200/50">
                <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
                    <div class="relative w-full lg:max-w-md group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="search-input" class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-50 border-transparent focus:bg-white focus:ring-4 focus:ring-indigo-100 transition-all outline-none font-medium placeholder:text-slate-400" placeholder="タイトルや内容で検索...">
                    </div>
                    <div class="flex flex-wrap gap-2 justify-center" id="genre-filters">
                        <!-- Genres will be injected here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- List Section -->
        <section id="list">
            <div class="flex items-center gap-4 mb-10">
                <h3 class="text-2xl font-black text-slate-800 tracking-tight">Archives</h3>
                <div class="h-px flex-grow bg-slate-200"></div>
                <div id="results-count" class="text-sm font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-tighter">0 Manuals</div>
            </div>

            <div id="manual-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 lg:gap-10">
                <!-- Manual cards will be injected here -->
                <!-- Loading State Initialized in main.js -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-white/50 border-t border-slate-200 py-20 mt-20">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-3 grayscale opacity-60">
                    <div class="w-8 h-8 bg-slate-800 rounded-lg flex items-center justify-center text-white font-bold text-lg">M</div>
                    <h4 class="text-lg font-bold tracking-tight text-slate-800">Manual Hub</h4>
                </div>
                <p class="text-slate-400 text-sm font-medium tracking-tight">&copy; 2026 Manual Hub. Updated by Antigravity Thinking.</p>
                <div class="flex gap-6">
                    <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors text-xs font-bold uppercase tracking-widest">Privacy</a>
                    <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors text-xs font-bold uppercase tracking-widest">Terms</a>
                </div>
            </div>
        </div>
    </footer>


    <!-- Detail Modal -->
    <div id="detail-modal" class="fixed inset-0 z-[100] hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 transition-opacity bg-slate-900/40 backdrop-blur-sm" aria-hidden="true" onclick="closeDetail()"></div>
            
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            
            <div class="inline-block overflow-hidden text-left align-bottom transition-all transform bg-white rounded-[2.5rem] shadow-2xl sm:my-8 sm:align-middle sm:max-w-4xl sm:w-full border border-slate-100 ring-1 ring-slate-200/50">
                <div class="px-8 pt-8 pb-4 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md z-10 border-b border-slate-50">
                    <div id="modal-meta" class="flex gap-3">
                        <!-- Injected meta -->
                    </div>
                    <button onclick="closeDetail()" class="p-2 rounded-full hover:bg-slate-100 text-slate-400 hover:text-slate-600 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <div class="px-10 py-12">
                    <div id="modal-content" class="prose prose-slate max-w-none">
                        <!-- Markdown content will be rendered here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
