<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Hub | プレミアム・アーカイブ</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', 'Noto Sans JP', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-indigo-100 selection:text-indigo-700">
    
    <div class="flex h-screen overflow-hidden">
        <!-- 左カラム: サイドバー -->
        <aside id="sidebar" class="sidebar flex flex-col glass-sidebar shadow-2xl shadow-indigo-100/20 z-40">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-10 group cursor-pointer" onclick="location.reload()">
                    <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-indigo-700 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-200 group-hover:scale-105 transition-transform duration-300">M</div>
                    <div class="flex flex-col">
                        <h1 class="text-lg font-extrabold tracking-tight text-slate-800 leading-none">Manual Hub</h1>
                        <span class="text-[10px] uppercase tracking-[0.2em] font-black text-indigo-500 mt-1">Archive System</span>
                    </div>
                </div>

                <!-- Search -->
                <div class="relative group mb-8">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search-input" class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-50 border-slate-200 border-2 focus:bg-white focus:border-indigo-500 focus:ring-0 transition-all outline-none font-bold text-sm placeholder:text-slate-400" placeholder="タイトルや内容で検索...">
                </div>

                <!-- Filters -->
                <div class="flex flex-wrap gap-2 mb-6" id="genre-filters">
                    <!-- Filters injected here -->
                </div>
                
                <div class="flex items-center justify-between px-2 mb-4">
                    <span class="text-[10px] uppercase font-black tracking-widest text-slate-400">Recent Archives</span>
                    <span id="results-count" class="text-[10px] font-black py-0.5 px-2 bg-slate-100 text-slate-500 rounded-full">0</span>
                </div>
            </div>

            <!-- Manual List -->
            <div class="flex-grow overflow-y-auto px-4 pb-10 custom-scrollbar" id="manual-list">
                <!-- List injected here -->
            </div>
        </aside>

        <!-- 中カラム: メインコンテンツエリア -->
        <main class="main-content flex flex-col relative">
            <!-- Mobile Header -->
            <header class="md:hidden sticky top-0 p-4 border-b border-white bg-white/70 backdrop-blur-md z-30 flex justify-between items-center">
                <button id="toggle-sidebar" class="p-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200" title="マニュアル一覧">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <span class="font-black text-slate-800">Archive Viewer</span>
                <button id="toggle-right-panel" class="p-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-200" title="カレンダー・タスク">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </button>
            </header>

            <div id="content-area" class="flex-grow flex flex-col">
                <!-- Initial State (Welcome Message) -->
                <div id="welcome-view" class="flex-grow flex items-center justify-center p-12 text-center fade-in">
                    <div class="max-w-xl">
                        <div class="w-24 h-24 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-8 animate-pulse shadow-inner">
                            <svg class="w-12 h-12 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <h2 class="text-4xl font-black text-slate-900 mb-6 tracking-tighter">あなたの知識を、<br><span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-emerald-600">永久保存する。</span></h2>
                        <p class="text-slate-400 font-bold mb-10 leading-relaxed">左側のリストから参照したいマニュアルを選択してください。</p>
                    </div>
                </div>

                <!-- Final Content View (Hidden by default) -->
                <div id="manual-view" class="hidden flex-grow flex flex-col overflow-y-auto">
                    <!-- Top Navigation/Meta -->
                    <div class="sticky top-0 bg-white/70 backdrop-blur-xl border-b border-slate-100 p-8 z-20">
                        <div class="max-w-3xl mx-auto flex justify-between items-center">
                            <div id="main-meta" class="flex gap-3">
                                <!-- Injected meta -->
                            </div>
                        </div>
                    </div>
                    
                    <div id="content-render" class="prose prose-slate prose-indigo lg:prose-xl max-w-3xl mx-auto pb-32 pt-16">
                        <!-- Markdown text injected here -->
                    </div>
                </div>
            </div>
        </main>

        <!-- 右カラム: カレンダー＋タスクパネル -->
        <aside id="calendar-panel" class="right-panel glass-sidebar border-l border-indigo-50/80 flex flex-col overflow-y-auto">
            <div class="p-5">
                <!-- タブ切り替え -->
                <div class="flex mb-5 bg-slate-100 rounded-xl p-1 gap-1">
                    <button id="tab-cal-btn" onclick="switchTab('calendar')" class="tab-btn tab-active flex-1 text-[10px] font-black py-2 rounded-lg transition-all">
                        📅 暦
                    </button>
                    <button id="tab-todo-btn" onclick="switchTab('todo')" class="tab-btn flex-1 text-[10px] font-black py-2 rounded-lg transition-all">
                        📋 TODO
                    </button>
                    <button id="tab-task-btn" onclick="switchTab('tasks')" class="tab-btn flex-1 text-[10px] font-black py-2 rounded-lg transition-all">
                        ✅ タスク
                    </button>
                </div>

                <!-- ============ カレンダーセクション ============ -->
                <div id="section-calendar">
                    <!-- 月ナビゲーション -->
                    <div class="flex items-center justify-between mb-4">
                        <button id="cal-prev" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
                        </button>
                        <span id="cal-month-label" class="text-sm font-black text-slate-700 tracking-tight"></span>
                        <button id="cal-next" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-indigo-50 text-slate-400 hover:text-indigo-600 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
                        </button>
                    </div>

                    <!-- 曜日ヘッダー -->
                    <div class="grid grid-cols-7 mb-1" id="cal-weekdays">
                        <div class="cal-weekday text-red-400">日</div>
                        <div class="cal-weekday">月</div>
                        <div class="cal-weekday">火</div>
                        <div class="cal-weekday">水</div>
                        <div class="cal-weekday">木</div>
                        <div class="cal-weekday">金</div>
                        <div class="cal-weekday text-indigo-400">土</div>
                    </div>

                    <!-- カレンダーグリッド -->
                    <div class="grid grid-cols-7 gap-0.5" id="cal-grid">
                        <!-- JS injection -->
                    </div>

                    <!-- 区切り -->
                    <div class="border-t border-slate-100 my-5"></div>

                    <!-- 選択日のマニュアル一覧 -->
                    <div id="cal-day-manuals">
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-300 mb-3">この月のアーカイブ</p>
                        <div id="cal-day-list" class="space-y-2">
                            <!-- JS injection -->
                        </div>
                    </div>
                </div>

                <!-- ============ TODOセクション ============ -->
                <div id="section-todo" class="hidden">
                    <div id="todo-list">
                        <!-- JS injection -->
                    </div>
                </div>

                <!-- ============ タスクセクション ============ -->
                <div id="section-tasks" class="hidden">
                    <!-- 進捗バー -->
                    <div class="mb-4">
                        <div class="flex items-center justify-between mb-1.5">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Progress</span>
                            <span id="task-progress-label" class="text-[10px] font-black text-indigo-500">0 / 0</span>
                        </div>
                        <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div id="task-progress-bar" class="h-full bg-gradient-to-r from-indigo-500 to-emerald-500 rounded-full transition-all duration-500" style="width:0%"></div>
                        </div>
                    </div>

                    <!-- フィルタータブ -->
                    <div class="flex gap-1 mb-3">
                        <button onclick="setTaskFilter('all')" id="tf-all" class="task-filter-btn active-filter flex-1 text-[10px] font-black py-1.5 rounded-lg transition-all">すべて</button>
                        <button onclick="setTaskFilter('active')" id="tf-active" class="task-filter-btn flex-1 text-[10px] font-black py-1.5 rounded-lg transition-all">未完了</button>
                        <button onclick="setTaskFilter('done')" id="tf-done" class="task-filter-btn flex-1 text-[10px] font-black py-1.5 rounded-lg transition-all">完了</button>
                    </div>

                    <!-- タスクリスト -->
                    <div id="task-list" class="space-y-2">
                        <!-- JS injection -->
                    </div>

                    <!-- 案内 -->
                    <div class="mt-5 px-3 py-2.5 bg-slate-50 rounded-xl border border-slate-100">
                        <p class="text-[10px] text-slate-400 font-bold leading-relaxed">タスクの追加・削除・完了はClaudeに依頼してください。</p>
                    </div>
                </div>

            </div>
        </aside>
    </div>

    <!-- モバイル用オーバーレイ -->
    <div id="panel-overlay" class="hidden fixed inset-0 bg-black/30 z-40 backdrop-blur-sm"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
